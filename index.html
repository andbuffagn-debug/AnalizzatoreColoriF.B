<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analizzatore Colori Foto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Analizzatore Colori Foto</h1>
    <p class="subtitle">Carica una foto: il sistema isola automaticamente la roccia e calcola i colori solo su quella.</p>

    <section class="panel">
      <label for="imageInput" class="file-label">Scegli immagine</label>
      <input id="imageInput" type="file" accept="image/*">

      <div class="controls">
        <label for="colorCount">Numero colori: <span id="colorCountValue">6</span></label>
        <input id="colorCount" type="range" min="3" max="12" value="6">
        <div class="selection-tools">
          <button id="clearSelectionBtn" type="button">Reset selezione</button>
          <button id="undoPointBtn" type="button">Annulla ultimo punto</button>
          <button id="closeSelectionBtn" type="button">Conferma area</button>
          <span id="selectionHint">Clicca/tocca sull'anteprima per creare un poligono. Premi "Conferma area" per chiudere.</span>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="preview-wrap panel">
        <h2>Anteprima</h2>
        <canvas id="previewCanvas" aria-label="Anteprima roccia isolata"></canvas>
        <canvas id="analysisCanvas" hidden></canvas>
      </div>

      <div class="result-wrap panel">
        <h2>Percentuali colori</h2>
        <p id="hint">Carica una foto per iniziare.</p>
        <div id="results"></div>
      </div>
    </section>

    <footer class="author-box" aria-label="autore">
      Autore: Fausto Buffagni
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
